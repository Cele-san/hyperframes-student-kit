<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>RAH P01 — Hook + rubber stamp (overlay layer)</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 400; font-display: block; src: url(assets/fonts/Geist-400.woff2) format('woff2'); }
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/Geist-500.woff2) format('woff2'); }
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 600; font-display: block; src: url(assets/fonts/Geist-600.woff2) format('woff2'); }
      @font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: block; src: url(assets/fonts/GeistMono-400.woff2) format('woff2'); }
      @font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/GeistMono-500.woff2) format('woff2'); }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: transparent; /* Lane A part — overlays only, no canvas */
        font-family: "Geist", system-ui, sans-serif;
      }
      :root {
        --bd: #222f4c; --bd-inner: #283755; --bd-card: #25334f;
        --tx: #e9edf6; --tx-bright2: #c8d1e3; --tx-code: #6d7894; --tx-ghost: #5b6580;
        --blossom: #f0a8c2; --fill-tx: #152848;
        --glow: rgba(240, 168, 194, 0.30); --glint: rgba(210, 226, 255, 0.18);
        --font-mono: "Geist Mono", ui-monospace, Menlo, monospace;
      }
      #p01-root { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
      #p01-root .reference-layer { position: absolute; inset: 0; z-index: 0; }
      #p01-root .reference-layer video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      #p01-root .overlay-root { position: absolute; inset: 0; z-index: 10; }

      /* word counter — top-right over the streaming plan wall */
      #p01-root .counter { position: absolute; right: 90px; top: 80px;
        font: 500 22px/1 var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--tx-bright2); background: rgba(15, 22, 38, 0.92);
        border: 1px solid var(--bd); border-radius: 6px; padding: 13px 18px;
        box-shadow: inset 0 1px 0 var(--glint); white-space: nowrap; }

      /* Karpathy tease — same geometry as the P02/P03 card, but the post body is
         DEFOCUSED (the curiosity gap holds; only "a line matters" is shown) */
      #p01-root .kcard { position: absolute; left: 120px; top: 150px; width: 644px;
        border-radius: 14px; overflow: hidden; border: 1px solid var(--bd-card);
        box-shadow: inset 0 1px 0 var(--glint), 0 30px 90px rgba(0, 0, 0, 0.6); background: #04070e; }
      #p01-root .kcard img { display: block; width: 640px; height: auto; margin: 1px; border-radius: 13px;
        filter: blur(7px); }
      #p01-root .kline { position: absolute; left: 34px; top: 76px; width: 240px; height: 3px;
        background: var(--blossom); border-radius: 2px; transform-origin: left center;
        box-shadow: 0 0 12px var(--glow); }
      #p01-root .kfade { position: absolute; left: 0; right: 0; bottom: 0; height: 72px;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, #000000 92%); }

      /* the rubber stamp — blossom fill, sharp corners, hand-applied tilt */
      #p01-root .stamp { position: absolute; left: 1010px; top: 380px;
        font: 500 30px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase;
        background: var(--blossom); color: var(--fill-tx); padding: 20px 28px;
        box-shadow: 0 0 30px var(--glow); transform: rotate(-6deg); }

      /* the wall-chip pile — "all day, every day" */
      #p01-root .pile { position: absolute; left: 140px; top: 380px; width: 420px; height: 560px; }
      #p01-root .wchip { position: absolute; width: 150px; height: 96px;
        background: rgba(15, 22, 38, 0.94); border: 1px solid var(--bd-inner); border-radius: 6px;
        padding: 14px 14px; display: flex; flex-direction: column; gap: 10px; }
      #p01-root .wchip i { display: block; height: 8px; border-radius: 2px; background: var(--tx-code); opacity: 0.7; }
      #p01-root .pile-label { position: absolute; left: 0px; top: 488px;
        font: 500 21px/1 var(--font-mono); letter-spacing: 0.12em; color: var(--tx-bright2);
        background: rgba(15, 22, 38, 0.92); border: 1px solid var(--bd); border-radius: 6px;
        padding: 12px 18px; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-o1ff" id="p01-root" data-composition-id="p01-hook" data-start="0" data-duration="56.99" data-width="1920" data-height="1080">

      <div data-hf-id="hf-js6p" class="overlay-root">

        <!-- word counter · 0.4–11.8 · ticks with the streaming wall, revalues on
             "I'd taken in almost none of it" -->
        <div data-hf-id="hf-9658" class="counter clip" id="counter" data-start="0.4" data-duration="11.4" data-track-index="2">
          <span data-hf-id="hf-7qdr" id="counter-text">0 WORDS</span>
        </div>

        <!-- Karpathy tease · 15.4–27.6 · body defocused, one line flagged.
             NOTE the dramatic irony elsewhere: the wall at 0:37 contains the wrong
             model name (Gemini 3.5 Pro) — deliberately NOT flagged here. P10 pays it off. -->
        <div data-hf-id="hf-27r8" class="kcard clip" id="kcard" data-start="15.4" data-duration="12.2" data-track-index="3">
          <img data-hf-id="hf-lajw" src="assets/karpathy-card.png" alt="">
          <div data-hf-id="hf-aswk" class="kline" id="kline"></div>
          <div data-hf-id="hf-12e5" class="kfade"></div>
        </div>

        <!-- rubber stamp · 41.9–46.9 · "you just rubber stamped a plan you never
             engaged with" — slammed over the plan panel (the table with the error) -->
        <div data-hf-id="hf-1uxc" class="stamp clip" id="stamp" data-start="41.9" data-duration="5.0" data-track-index="4">
          APPROVED · UNREAD
        </div>

        <!-- wall-chip pile · 49.5–56.95 · "buried in these walls all day" -->
        <div data-hf-id="hf-yc3x" class="pile clip" id="pile" data-start="49.5" data-duration="7.45" data-track-index="5">
          <div data-hf-id="hf-f7d6" class="pile-label" id="pile-label" style="opacity: 0">ALL DAY · EVERY DAY</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 56.99;
        const tl = gsap.timeline({ paused: true });

        /* ---------- word counter (0.4 → 11.5) ---------- */
        tl.fromTo("#counter", { y: -14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3, ease: "power2.out" }, 0.45);
        // ticks 0 → 2,000 landing exactly on the spoken "2000-word" (1.84–2.72)
        const count = { n: 0 };
        const ctext = document.getElementById("counter-text");
        tl.to(count, {
          n: 2000, duration: 2.2, ease: "power1.out",
          onUpdate: () => { ctext.textContent = Math.round(count.n).toLocaleString("en-US") + " WORDS"; },
        }, 0.5);
        // revalue lands ON "none" (VO 8.92–9.36): fill state change
        tl.set("#counter", { backgroundColor: "#f0a8c2", borderColor: "#f0a8c2", color: "#152848" }, 8.85);
        tl.add(() => { ctext.textContent = "RETAINED · ~0"; }, 8.85);
        tl.to("#counter", { opacity: 0, y: -12, duration: 0.3, ease: "power2.in" }, 11.4);

        /* ---------- Karpathy tease (15.6 → 27.5) ----------
           VO "Then I saw a post from Andre Karpathy" (14.98). Body stays blurred —
           the gap holds. The blossom line draws on "one little thing he said" (17.7). */
        tl.fromTo("#kcard", { y: 16, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 15.6);
        tl.fromTo("#kline", { scaleX: 0 }, { scaleX: 1, duration: 0.7, ease: "power2.out" }, 17.75);
        // EXIT (26.9) — focus-pull up, gone before the footage cuts back to the
        // plan wall at local 28.7 ("That plan was real")
        tl.to("#kcard", { y: -70, opacity: 0, filter: "blur(12px)", duration: 0.55, ease: "power3.in" }, 26.9);

        /* ---------- rubber stamp (42.18) ----------
           Lands ON "stamped" — pressed-in, hand-tilted, blossom fill over the
           plan table. No flash, no bounce (Linear: arrivals are pressed-in). */
        tl.fromTo("#stamp", { scale: 1.3, opacity: 0, filter: "blur(6px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.22, ease: "power3.out" }, 42.14);
        tl.to("#stamp", { opacity: 0, duration: 0.4, ease: "power2.in" }, 46.4);

        /* ---------- wall-chip pile (49.7 → 56.9) ----------
           VO "you're buried in these walls all day" (49.68). Twelve mini text-walls
           pile up beside Andy with motion-blurred flights; the label lands on
           "All day, every day" (52.0); everything dims on the self-blame question. */
        const pile = document.getElementById("pile");
        const chips = [];
        for (let i = 0; i < 12; i++) {
          const c = document.createElement("div");
          c.className = "wchip";
          const col = i % 2;
          const wob = Math.sin(i * 2.3 + 0.7);
          c.style.left = (col * 168 + Math.round(wob * 26)) + "px";
          c.style.top = (392 - i * 36) + "px";
          c.style.transform = `rotate(${(wob * 3).toFixed(1)}deg)`;
          c.style.zIndex = String(i);
          for (let k = 0; k < 3; k++) {
            const bar = document.createElement("i");
            bar.style.width = Math.round(122 * (0.7 + 0.3 * Math.abs(Math.sin(i * 1.3 + k * 0.9)))) + "px";
            c.appendChild(bar);
          }
          pile.appendChild(c);
          chips.push(c);
        }
        chips.forEach((c, i) => {
          tl.fromTo(c,
            { x: (i % 2 === 0 ? -110 : 90) + Math.round(Math.sin(i * 2.3 + 0.7) * 30),
              y: 120 + (i % 3) * 30, opacity: 0, filter: "blur(7px)" },
            { x: 0, y: 0, opacity: 1, filter: "blur(0px)", duration: 0.32, ease: "power3.out" },
            49.72 + i * 0.185);
        });
        tl.fromTo("#pile-label", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3, ease: "power2.out" }, 52.05);
        // "am I not just focused enough?" (55.26) — the pile dims with him
        tl.to("#pile", { opacity: 0.4, duration: 0.5, ease: "power2.inOut" }, 55.3);
        // clear before the P02 takeover canvas arrives at the boundary (56.99)
        tl.to("#pile", { opacity: 0, duration: 0.32, ease: "power2.in" }, 56.55);

        // Law #11 anchor — timeline fills the slot
        tl.to({}, { duration: SLOT }, 0);
        window.__timelines["p01-hook"] = tl;
      })();
    </script>
  </body>
</html>
