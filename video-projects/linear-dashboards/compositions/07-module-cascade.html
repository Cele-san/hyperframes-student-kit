    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 3.4; // extends past the 29.1 cut — cards recede UNDER title 08's flip-in
        const sel = (q) => `[data-composition-id="07-module-cascade"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Stair-step the stack in DEPTH (not just x/y) so it reads as a raked plane receding
        // into the frame like the reference — back card furthest, front card nearest the camera.
        tl.set(sel(".s7-mod-a"), { z: -210 }, 0);
        tl.set(sel(".s7-mod-b"), { z: -70 }, 0);
        tl.set(sel(".s7-mod-c"), { z: 80 }, 0);

        // Directional slides in the reference's order (Andy's note): IT requests leads from the
        // right, Bug & Cycle rises from below, Distribution of Effort arrives last from lower-left.
        // Cards begin rising at t=0 — they coexist with title 06's fade-out (overlapped seam).
        tl.from(sel(".s7-mod-c"),
          { x: 300, y: 40, opacity: 0, filter: "blur(9px)", duration: 0.7, ease: "power3.out" }, 0);
        tl.from(sel(".s7-mod-b"),
          { y: 260, opacity: 0, filter: "blur(9px)", duration: 0.7, ease: "power3.out" }, 0.18);
        tl.from(sel(".s7-mod-a"),
          { x: -220, y: 200, opacity: 0, filter: "blur(9px)", duration: 0.7, ease: "power3.out" }, 0.36);

        // Collective slow rise through the hold — motion never fully stops.
        tl.to(sel(".s7-world"), { y: -22, duration: 1.45, ease: "none" }, 1.3);

        // EXIT: the stack recedes downward while title 08 flips in above it (ref b08_01).
        tl.to(sel(".s7-world"),
          { y: "+=300", filter: "blur(6px)", duration: 0.62, ease: "power2.in" }, 2.78);
        tl.to(sel(".s7-dark"), { opacity: 0.85, duration: 0.62, ease: "power2.in" }, 2.78);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["07-module-cascade"] = tl;
      })();
