    <style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 4.85;
        const ID = "05-issues-burnup";
        const sel = (q) => `[data-composition-id="${ID}"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        function mulberry32(a) {
          return function () {
            a |= 0; a = (a + 0x6d2b79f5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rnd = mulberry32(41);

        // Stacked multi-hue segment rods — each bar is a column of colored light segments.
        const SEGC = [
          { c: "#818cf1", g: "129,140,241" },
          { c: "#74fcff", g: "116,252,255" },
          { c: "#80a1f7", g: "128,161,247" },
          { c: "#f08085", g: "240,128,133" },
          { c: "#63b89e", g: "99,184,158" },
          { c: "#725aa6", g: "114,90,166" },
        ];
        const stacks = document.querySelector(sel(".s5-stacks"));
        const days = document.querySelector(sel(".s5-days"));
        for (let i = 0; i < 14; i++) {
          const stack = document.createElement("div");
          stack.className = "s5-stack";
          const total = 140 + rnd() * 380;                 // px — near-full-height like the reference
          let used = 0;
          const nseg = 3 + Math.floor(rnd() * 3);
          for (let s = 0; s < nseg && used < total; s++) {
            const h = Math.max(16, Math.min(total - used, 24 + rnd() * (total / nseg)));
            used += h + 5;
            const seg = document.createElement("div");
            seg.className = "s5-seg";
            // Cool-weighted mix — indigo/cyan/blue carry ~70%, red stays rare.
            const p = rnd();
            const hue = p < 0.26 ? SEGC[0] : p < 0.5 ? SEGC[1] : p < 0.72 ? SEGC[2] : p < 0.8 ? SEGC[3] : p < 0.92 ? SEGC[4] : SEGC[5];
            seg.style.height = h + "px";
            seg.style.background = `linear-gradient(180deg, ${hue.c}, rgba(${hue.g},0.55))`;
            seg.style.boxShadow =
              `0 0 8px 2px rgba(${hue.g},0.75), 0 0 26px 6px rgba(${hue.g},0.3)`;
            stack.appendChild(seg);
          }
          stacks.appendChild(stack);
          const d = document.createElement("span");
          d.textContent = 12 + i;
          days.appendChild(d);
        }

        // Bars grow SLOWLY while the camera travels with them — motion and data share the beat.
        tl.from(sel(".s5-stack"),
          { scaleY: 0, duration: 0.9, ease: "power2.out", stagger: 0.13 }, 0.2);
        tl.from(sel(".s5-days span"),
          { opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.06 }, 0.4);

        // Camera: ONE continuous left→right travel across the whole beat — no hold, no lurch.
        tl.fromTo(sel(".s5-world"), { x: 640 }, { x: 560, duration: 1.2, ease: "sine.in" }, 0);
        tl.to(sel(".s5-world"), { x: -460, duration: 2.4, ease: "power1.inOut" }, 1.2);
        tl.to(sel(".s5-world"), { x: -490, duration: 1.25, ease: "sine.out" }, 3.6);
        // Card B waits in shadow, catching the light as the camera commits to the pan.
        tl.fromTo(sel(".s5-card-b"),
          { opacity: 0.22 }, { opacity: 1, duration: 1.0, ease: "power2.inOut" }, 1.8);
        // Light mid-travel smear (Law #10).
        tl.to(sel(".s5-world"), { filter: "blur(5px)", duration: 0.5, ease: "power2.in" }, 1.8);
        tl.to(sel(".s5-world"), { filter: "blur(0px)", duration: 0.55, ease: "power3.out" }, 2.5);
        tl.to(sel(".s5-world"), { y: -12, duration: 1.35, ease: "none" }, 3.5);

        // Sunrise wipe — the area chart is NOT pre-formed: it reveals left→right as the camera
        // arrives, a soft light edge riding the reveal (ref: gradual, like rising sunset rays).
        tl.fromTo(sel(".s5-area"),
          { clipPath: "inset(0% 100% 0% 0%)" },
          { clipPath: "inset(0% 0% 0% 0%)", duration: 2.2, ease: "sine.inOut" }, 2.0);
        tl.fromTo(sel(".s5-sunray"),
          { x: -80, opacity: 0 }, { x: 1120, opacity: 0.55, duration: 2.2, ease: "sine.inOut" }, 2.0);
        tl.to(sel(".s5-sunray"), { opacity: 0, duration: 0.35, ease: "power1.out" }, 4.2);

        // Crests amplify DURING the reveal — the mounds are alive as the light uncovers them.
        tl.to(sel(".s5-a3"), {
          attr: { d: "M0,520 L0,422 C100,405 190,340 300,308 C390,282 440,352 520,360 C620,372 700,250 800,206 C880,170 920,252 990,246 C1080,240 1170,148 1240,112 L1240,520 Z" },
          duration: 1.5, ease: "sine.inOut" }, 2.9);
        tl.to(sel(".s5-a2"), {
          attr: { d: "M0,520 L0,460 C110,448 200,404 310,384 C410,366 470,416 560,412 C660,408 740,330 850,300 C940,276 990,322 1060,310 C1130,300 1190,244 1240,226 L1240,520 Z" },
          duration: 1.5, ease: "sine.inOut" }, 2.95);
        tl.to(sel(".s5-a1"), {
          attr: { d: "M0,520 L0,492 C120,484 230,462 350,450 C460,440 540,460 640,448 C740,436 840,408 940,392 C1040,377 1150,362 1240,350 L1240,520 Z" },
          duration: 1.5, ease: "sine.inOut" }, 3.0);

        // EXIT: fast dissolve to black — title card 06 rests on the far side (luma cut at 24.35).
        tl.to(sel(".s5-dark"), { opacity: 1, duration: 0.32, ease: "power2.in" }, 4.53);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines[ID] = tl;
      })();
    </script>
