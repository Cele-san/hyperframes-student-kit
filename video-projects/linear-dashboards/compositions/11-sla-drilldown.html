    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 4.7;
        const ID = "11-sla-drilldown";
        const sel = (q) => `[data-composition-id="${ID}"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        function mulberry32(a) {
          return function () {
            a |= 0; a = (a + 0x6d2b79f5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rnd = mulberry32(67);

        // Purple stacked volume bars — rising request load.
        const VSEG = [
          { c: "#8d83dd", g: "141,131,221" },
          { c: "#665cb8", g: "102,92,184" },
          { c: "#4a4292", g: "74,66,146" },
        ];
        const vbars = document.querySelector(sel(".s11-vbars"));
        for (let i = 0; i < 12; i++) {
          const stack = document.createElement("div");
          stack.className = "s11-vstack";
          const total = 30 + i * 14 + rnd() * 26;
          VSEG.forEach((s, k) => {
            const seg = document.createElement("div");
            seg.className = "s11-vseg";
            seg.style.height = Math.max(8, total * (0.5 - k * 0.14) + rnd() * 8) + "px";
            seg.style.background = `linear-gradient(180deg, ${s.c}, rgba(${s.g},0.55))`;
            seg.style.boxShadow = `0 0 6px 1px rgba(${s.g},0.35), 0 0 16px 4px rgba(${s.g},0.12)`;
            stack.appendChild(seg);
          });
          vbars.appendChild(stack);
        }

        // The 34-issues drill-down list (titles from the reference frames).
        const ISSUES = [
          ["SEC-3590", "Restrict access to admin routes behind VPN-only network", "7d", "done"],
          ["SEC-3514", "Validate expired credentials cleanup process", "5d", "open"],
          ["INF-158",  "Audit service account usage across environments", "2d 11h", "done"],
          ["INF-3484", "Patch SSL certificates nearing expiration this month", "2d 21h", "open"],
          ["INF-9616", "Reduce timeout errors from edge proxy layer", "7d", "open"],
          ["INF-3946", "Align DNS TTL settings for consistency across zones", "2d 16h", "prog"],
          ["DEV-3988", "Address pipeline skips due to hydration flag failures", "7d", "open"],
          ["DEV-9555", "Re-enable test matrix after instability on arm64", "6d", "open"],
          ["DEV-3957", "Increase retention window for CI build artifacts", "1/1", "prog"],
          ["DEV-3958", "Remove deprecated scripts from deploy automation", "6d", "open"],
          ["APP-3530", "Roadmap not displaying in custom view", "5d", "open"],
          ["APP-3551", "Stroke missing on milestone indicator in grouped view", "5d", "prog"],
          ["APP-3954", "Undo action breaks when navigating from detail page", "4d", "open"],
          ["SLA-3543", "Escalated tickets pending triage for over 48 hours", "3d", "open"],
        ];
        const STATUS = {
          done: '<svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="7.4" fill="#4cb782"/><path d="M5.8 9.2l2.2 2.2 4-4.6" fill="none" stroke="#0b0c0f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
          prog: '<svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="6.8" fill="none" stroke="#d9b13b" stroke-width="1.6"/><path d="M9 9V4.5A4.5 4.5 0 0 1 13.5 9z" fill="#d9b13b"/></svg>',
          open: '<svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="6.8" fill="none" stroke="#43474f" stroke-width="1.6" stroke-dasharray="2.4 2.2"/></svg>',
        };
        const PRI = '<svg viewBox="0 0 16 16" fill="#5d626b"><rect x="2" y="9.5" width="2.8" height="4.5" rx="1"/><rect x="6.6" y="6.5" width="2.8" height="7.5" rx="1"/><rect x="11.2" y="3.5" width="2.8" height="10.5" rx="1" opacity="0.3"/></svg>';
        const FLAME = '<svg viewBox="0 0 16 16" fill="#b08433"><path d="M8 1.2C6.4 3.6 4 5 4 8.4a4 4 0 0 0 8 0C12 5 9.6 3.6 8 1.2z"/></svg>';
        const AVA = [
          "radial-gradient(circle at 35% 30%, #565b66, #262a31)",
          "radial-gradient(circle at 35% 30%, #5d564f, #2a2622)",
          "radial-gradient(circle at 35% 30%, #4f5a57, #232a27)",
          "radial-gradient(circle at 35% 30%, #585063, #28242e)",
        ];
        const list = document.querySelector(sel(".s11-list"));
        ISSUES.forEach(([id, title, dur, st], i) => {
          const row = document.createElement("div");
          row.className = "s11-irow";
          row.innerHTML =
            `<span class="s11-ipri">${PRI}</span>` +
            `<span class="s11-iid">${id}</span>` +
            `<span class="s11-istatus">${STATUS[st]}</span>` +
            `<span class="s11-ititle">${title}</span>` +
            `<span class="s11-ichip">${FLAME}${dur}</span>` +
            `<span class="s11-iava" style="background:${AVA[i % AVA.length]}"></span>`;
          list.appendChild(row);
        });

        // ENTRANCE: the whole dashboard slides UP from the bottom at a visible angle (Andy's note).
        tl.from(sel(".s11-world"),
          { y: 320, rotationX: 16, opacity: 0, filter: "blur(8px)", duration: 1.0, ease: "power2.out" }, 0);

        // Volume bars grow on entrance — data populates on the beat.
        tl.from(sel(".s11-vstack"),
          { scaleY: 0, duration: 0.5, ease: "power3.out", stagger: 0.04 }, 0.5);

        // Slow drift after it settles — motion never fully stops.
        tl.fromTo(sel(".s11-world"), { y: 0 }, { y: -10, duration: SLOT - 1.0, ease: "none" }, 1.0);

        // Cursor: enter → hover LOW RISK first (deliberate, not a misclick) → travel up to MODERATE.
        // Whole block advanced 0.4s (final-pass note) so the drill arrives in step with the reference's
        // push-in — uniform shift preserves every relative offset, so the choreography stays intact.
        tl.fromTo(sel(".s11-cursor"),
          { x: 1480, y: 760, opacity: 0 },
          { x: 470, y: 432, opacity: 1, duration: 0.7, ease: "power2.inOut" }, 0.6);
        tl.to(sel(".s11-srow-low"), { backgroundColor: "#141519", duration: 0.16, ease: "power1.out" }, 1.22);
        // …hold on Low, then move up to Moderate — the highlight transfers.
        tl.to(sel(".s11-srow-low"), { backgroundColor: "rgba(20,21,25,0)", duration: 0.16, ease: "power1.out" }, 1.62);
        tl.to(sel(".s11-cursor"), { x: 470, y: 386, duration: 0.34, ease: "power2.inOut" }, 1.62);
        tl.to(sel(".s11-srow-mod"), { backgroundColor: "#16181d", duration: 0.16, ease: "power1.out" }, 1.92);
        // …settle, then click.
        tl.to(sel(".s11-cursor"), { scale: 0.86, duration: 0.08, ease: "power2.in" }, 2.1);
        tl.to(sel(".s11-cursor"), { scale: 1, duration: 0.1, ease: "power2.out" }, 2.2);
        tl.to(sel(".s11-srow-mod"), { backgroundColor: "#1b1e25", duration: 0.1, ease: "power1.out" }, 2.15);

        // DRILL: the dash recedes (stays visible but dimmed HARDER beneath — never removed).
        tl.to(sel(".s11-dash"), { opacity: 0.26, filter: "blur(4px)", scale: 0.965, duration: 0.34, ease: "power2.inOut" }, 2.32);
        // Panel slides in from the right with a slight yaw, then FALLS onto the dashboard (y settle).
        tl.from(sel(".s11-panel"),
          { x: 320, rotationY: -7, opacity: 0, filter: "blur(8px)", duration: 0.46, ease: "power2.inOut" }, 2.32);
        tl.fromTo(sel(".s11-panel"),
          { y: -18 }, { y: 0, duration: 0.28, ease: "expo.out" }, 2.72);
        // Rows reveal top→bottom with a staircase offset (each successive row enters a touch further).
        tl.from(sel(".s11-irow"),
          { opacity: 0, y: 12, x: (i) => -(8 + i * 3), duration: 0.3, ease: "power2.out", stagger: 0.055 }, 2.52);

        // EXIT: the world recedes — scale down, defocus, fade into the logo's black.
        tl.to(sel(".s11-world"),
          { scale: 0.97, filter: "blur(9px)", duration: 0.5, ease: "power2.in" }, 4.2);
