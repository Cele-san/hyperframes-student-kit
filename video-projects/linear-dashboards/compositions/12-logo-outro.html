<template id="comp-12-logo-outro">
  <div data-composition-id="12-logo-outro" data-width="1920" data-height="960">
    <div class="s12-stage">
      <div class="s12-lockup">
        <svg class="s12-mark" viewBox="0 0 100 100" fill="none">
          <!-- Linear mark: solid circle with diagonal stripe cuts toward the lower-left. -->
          <defs>
            <mask id="s12-cutmask">
              <circle cx="50" cy="50" r="44" fill="white"/>
              <g transform="rotate(45 50 50)">
                <rect x="-30" y="61" width="160" height="5.5" fill="black"/>
                <rect x="-30" y="73.5" width="160" height="5.5" fill="black"/>
                <rect x="-30" y="86" width="160" height="5.5" fill="black"/>
              </g>
            </mask>
          </defs>
          <circle cx="50" cy="50" r="44" fill="#f5f6f7" mask="url(#s12-cutmask)"/>
        </svg>
        <span class="s12-wordmark">Linear</span>
      </div>
    </div>

    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/Geist-500.woff2) format('woff2'); }
      [data-composition-id="12-logo-outro"] {
        position: absolute; inset: 0;
        background: #000; /* the final rest */
        overflow: hidden;
        font-family: "Geist", sans-serif;
      }
      [data-composition-id="12-logo-outro"] .s12-stage {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="12-logo-outro"] .s12-lockup {
        display: flex; align-items: center; gap: 36px;
      }
      [data-composition-id="12-logo-outro"] .s12-mark { width: 134px; height: 134px; }
      /* This spot's lockup reads near-white (sampled #f8f8f8) — brighter than Code Intelligence's. */
      [data-composition-id="12-logo-outro"] .s12-wordmark {
        font-size: 98px; font-weight: 500;
        letter-spacing: -0.02em;
        color: #f5f6f7;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 3.3;
        const sel = (q) => `[data-composition-id="12-logo-outro"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Fade-in only — no scale. Full-bright early, then the longest stillness in the piece (~2.4s).
        tl.from(sel(".s12-lockup"),
          { opacity: 0, duration: 0.7, ease: "power1.inOut" }, 0.2);

        // No exit: ends dead-still on the logo (Law #9 / register law).
        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["12-logo-outro"] = tl;
      })();
    </script>
  </div>
</template>
