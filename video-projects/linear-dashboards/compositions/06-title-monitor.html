    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/Geist-500.woff2) format('woff2'); }
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 600; font-display: block; src: url(assets/fonts/Geist-600.woff2) format('woff2'); }
      [data-composition-id="06-title-monitor"] {
        position: absolute; inset: 0;
        /* Transparent — this layer overlaps beat 07's rise (z-stacked above it in the master);
           the master body supplies the black rest. */
        background: transparent;
        overflow: hidden;
        font-family: "Geist", sans-serif;
      }
      [data-composition-id="06-title-monitor"] .s6-stage {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      /* This spot runs its rests brighter than Code Intelligence — sampled #f8f8f8, not gray-white. */
      [data-composition-id="06-title-monitor"] .s6-title {
        font-size: 96px; font-weight: 600;
        letter-spacing: -0.015em;
        color: #edeef1;
        white-space: nowrap;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 2.0; // extends past the 26.1 cut — the fade-out rides OVER 07's rising cards
        const sel = (q) => `[data-composition-id="06-title-monitor"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Luminance fade — pure opacity, no scale-from, no slide, no tracking stunt.
        tl.from(sel(".s6-title"),
          { opacity: 0, duration: 0.55, ease: "power1.inOut" }, 0.15);

        // Micro-drift through the hold — motion never fully stops.
        tl.to(sel(".s6-title"), { scale: 1.005, duration: 0.55, ease: "none" }, 1.1);

        // Dissolve out OVER the cascade — overlapped seam, not a cut (ref b07_01: both coexist).
        tl.to(sel(".s6-title"),
          { opacity: 0, duration: 0.32, ease: "power2.in" }, 1.68);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["06-title-monitor"] = tl;
      })();
    </script>
  </div>
