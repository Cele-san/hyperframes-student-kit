<template id="comp-09-layout-customize">
  <div data-composition-id="09-layout-customize" data-width="1920" data-height="960">
    <div class="s9-stage">
      <div class="s9-cam">
        <div class="s9-world">
          <div class="s9-head">
            <span class="s9-chip">
              <svg viewBox="0 0 16 16" fill="none" stroke="#4cb782" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="9" r="3.6"/><path d="M8 5.4V3.4M4.6 7l-1.8-1M11.4 7l1.8-1M4.4 10.4H2.4M11.6 10.4h2M5 12.6l-1.4 1.4M11 12.6l1.4 1.4"/></svg>
            </span>
            <h2 class="s9-title">Bug &amp; Cycle Performance</h2>
          </div>
          <div class="s9-grid">
            <!-- Widget 1 — priority-colored scatter; the drag target. -->
            <div class="s9-w s9-w-scatter">
              <div class="s9-wlabel">Bug resolution time trailing 90d</div>
              <div class="s9-wchart">
                <div class="s9-gline" style="bottom:20%"><span class="s9-gtick">1w</span></div>
                <div class="s9-gline" style="bottom:40%"><span class="s9-gtick">2w</span></div>
                <div class="s9-gline" style="bottom:60%"><span class="s9-gtick">3w</span></div>
                <div class="s9-gline" style="bottom:80%"><span class="s9-gtick">4w</span></div>
                <!-- priority columns built by script -->
                <div class="s9-picons">
                  <span class="s9-pi"><svg viewBox="0 0 16 16" fill="#e15c38"><rect x="2" y="2" width="12" height="12" rx="3"/></svg></span>
                  <span class="s9-pi"><svg viewBox="0 0 16 16" fill="#d9b13b"><rect x="2" y="9" width="3" height="5" rx="1"/><rect x="6.5" y="6" width="3" height="8" rx="1"/><rect x="11" y="3" width="3" height="11" rx="1"/></svg></span>
                  <span class="s9-pi"><svg viewBox="0 0 16 16" fill="#6fae5d"><rect x="2" y="9" width="3" height="5" rx="1"/><rect x="6.5" y="6" width="3" height="8" rx="1"/><rect x="11" y="3" width="3" height="11" rx="1" opacity="0.25"/></svg></span>
                  <span class="s9-pi"><svg viewBox="0 0 16 16" fill="#51a5a7"><rect x="2" y="9" width="3" height="5" rx="1"/><rect x="6.5" y="6" width="3" height="8" rx="1" opacity="0.25"/><rect x="11" y="3" width="3" height="11" rx="1" opacity="0.25"/></svg></span>
                </div>
              </div>
            </div>
            <!-- Widget 2 — the big stat that reflows when the scatter grows. -->
            <div class="s9-w s9-w-stat">
              <div class="s9-wlabel">Median triage time</div>
              <div class="s9-statval">46m</div>
              <div class="s9-wlabel s9-wlabel-low">Age of bugs</div>
            </div>
            <!-- Widget 3 — priority table. -->
            <div class="s9-w s9-w-table">
              <div class="s9-wlabel">Current open bugs</div>
              <div class="s9-microlabel">Priority</div>
              <div class="s9-trow"><span class="s9-tico">—</span><span class="s9-ttext">No priority</span><span class="s9-tnum">8</span></div>
              <div class="s9-trow"><span class="s9-tico"><svg viewBox="0 0 16 16" fill="#d9b13b"><rect x="2" y="9" width="3" height="5" rx="1"/><rect x="6.5" y="6" width="3" height="8" rx="1"/><rect x="11" y="3" width="3" height="11" rx="1"/></svg></span><span class="s9-ttext">High</span><span class="s9-tnum">1</span></div>
              <div class="s9-trow"><span class="s9-tico"><svg viewBox="0 0 16 16" fill="#6fae5d"><rect x="2" y="9" width="3" height="5" rx="1"/><rect x="6.5" y="6" width="3" height="8" rx="1"/><rect x="11" y="3" width="3" height="11" rx="1" opacity="0.25"/></svg></span><span class="s9-ttext">Medium</span><span class="s9-tnum">9</span></div>
              <div class="s9-trow"><span class="s9-tico"><svg viewBox="0 0 16 16" fill="#51a5a7"><rect x="2" y="9" width="3" height="5" rx="1"/><rect x="6.5" y="6" width="3" height="8" rx="1" opacity="0.25"/><rect x="11" y="3" width="3" height="11" rx="1" opacity="0.25"/></svg></span><span class="s9-ttext">Low</span><span class="s9-tnum">14</span></div>
            </div>
          </div>
        </div>
      </div>
      <!-- Cursor is screen-space — the protagonist of this beat. -->
      <svg class="s9-cursor" viewBox="0 0 24 24">
        <path d="M5 2l14 12.5-6.6 0.8L16 22l-3.2 1.4-3.6-6.9L5 21z" fill="#f2f3f5" stroke="#1a1b1e" stroke-width="1.4"/>
      </svg>
      <div class="s9-vig"></div>
      <div class="s9-dark"></div>
    </div>

    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 400; font-display: block; src: url(assets/fonts/Geist-400.woff2) format('woff2'); }
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 600; font-display: block; src: url(assets/fonts/Geist-600.woff2) format('woff2'); }
      [data-composition-id="09-layout-customize"] {
        position: absolute; inset: 0;
        background: #020203;
        overflow: hidden;
        font-family: "Geist", sans-serif;
      }
      [data-composition-id="09-layout-customize"] .s9-stage { position: absolute; inset: 0; }
      [data-composition-id="09-layout-customize"] .s9-cam {
        position: absolute; inset: 0;
        perspective: 1700px;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="09-layout-customize"] .s9-world {
        width: 1820px; height: 880px; flex: none;
        transform-style: preserve-3d;
        transform: rotateX(9deg) rotateY(-7deg) scale(1.16);
        padding: 36px 60px;
        display: flex; flex-direction: column;
      }
      [data-composition-id="09-layout-customize"] .s9-head {
        display: flex; align-items: center; gap: 18px;
      }
      [data-composition-id="09-layout-customize"] .s9-chip {
        width: 42px; height: 42px; border-radius: 10px;
        background: #11221a; border: 1px solid #1c3527;
        display: flex; align-items: center; justify-content: center;
        flex: none;
      }
      [data-composition-id="09-layout-customize"] .s9-chip svg { width: 20px; height: 20px; }
      [data-composition-id="09-layout-customize"] .s9-title {
        font-size: 30px; font-weight: 600;
        letter-spacing: -0.01em;
        color: #e9eaec;
      }
      /* Absolute layout — the drag moves real cards between slots (Andy: dragged right→left, drops). */
      [data-composition-id="09-layout-customize"] .s9-grid {
        position: relative;
        margin-top: 36px;
        flex: 1;
      }
      [data-composition-id="09-layout-customize"] .s9-w {
        position: absolute; top: 0; bottom: 0;
        background: linear-gradient(180deg, #0c0d10, #0a0b0d);
        border: 1px solid #1a1c21;
        border-radius: 14px;
        padding: 30px 34px;
        display: flex; flex-direction: column;
      }
      /* CSS rest = END state: the scatter card has landed on the LEFT. */
      [data-composition-id="09-layout-customize"] .s9-w-scatter { left: 0;    width: 740px; z-index: 3; }
      [data-composition-id="09-layout-customize"] .s9-w-stat    { left: 766px; width: 488px; }
      [data-composition-id="09-layout-customize"] .s9-w-table   { left: 1280px; width: 420px; }
      [data-composition-id="09-layout-customize"] .s9-wlabel {
        font-size: 18px; font-weight: 600;
        color: #c2c6cc;
      }
      [data-composition-id="09-layout-customize"] .s9-wlabel-low { margin-top: auto; color: #6d727c; font-weight: 400; font-size: 16px; }
      [data-composition-id="09-layout-customize"] .s9-wchart {
        position: relative;
        flex: 1;
        margin-top: 24px;
      }
      [data-composition-id="09-layout-customize"] .s9-gline {
        position: absolute; left: 0; right: 44px; height: 1px;
        background: rgba(180,190,215,0.05);
      }
      [data-composition-id="09-layout-customize"] .s9-gtick {
        position: absolute; right: -44px; top: -9px;
        font-size: 13px; color: #4e525c;
      }
      [data-composition-id="09-layout-customize"] .s9-sdot { position: absolute; border-radius: 50%; }
      [data-composition-id="09-layout-customize"] .s9-picons {
        position: absolute; left: 0; right: 44px; bottom: -6px;
        display: flex; justify-content: space-around;
      }
      [data-composition-id="09-layout-customize"] .s9-pi { width: 17px; height: 17px; }
      [data-composition-id="09-layout-customize"] .s9-pi svg { width: 17px; height: 17px; }
      [data-composition-id="09-layout-customize"] .s9-statval {
        margin-top: 30px;
        font-size: 68px; font-weight: 500;
        letter-spacing: -0.01em;
        color: #e4e6e9;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="09-layout-customize"] .s9-microlabel {
        margin-top: 20px;
        font-size: 14px;
        color: #5d626b;
      }
      [data-composition-id="09-layout-customize"] .s9-trow {
        margin-top: 16px;
        display: flex; align-items: center; gap: 13px;
        font-size: 16.5px;
      }
      [data-composition-id="09-layout-customize"] .s9-tico {
        width: 17px; height: 17px;
        display: flex; align-items: center; justify-content: center;
        color: #5d626b; font-size: 14px;
        flex: none;
      }
      [data-composition-id="09-layout-customize"] .s9-tico svg { width: 16px; height: 16px; }
      [data-composition-id="09-layout-customize"] .s9-ttext { color: #b6bac2; }
      [data-composition-id="09-layout-customize"] .s9-tnum { margin-left: auto; color: #9aa0a7; font-variant-numeric: tabular-nums; }
      [data-composition-id="09-layout-customize"] .s9-cursor {
        position: absolute;
        width: 27px; height: 27px;
        left: 0; top: 0;
        filter: drop-shadow(0 2px 5px rgba(0,0,0,0.6));
      }
      [data-composition-id="09-layout-customize"] .s9-vig {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, rgba(2,2,3,0) 46%, rgba(0,0,0,0.6) 100%);
      }
      [data-composition-id="09-layout-customize"] .s9-dark {
        position: absolute; inset: 0; pointer-events: none;
        background: #000; opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 2.6;
        const ID = "09-layout-customize";
        const sel = (q) => `[data-composition-id="${ID}"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        function mulberry32(a) {
          return function () {
            a |= 0; a = (a + 0x6d2b79f5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rnd = mulberry32(53);

        // Priority-colored scatter columns — color IS the category, mass sits low with outliers high.
        const groups = [
          { cx: 12, c: "#e15c38", g: "225,92,56",  n: 20 },
          { cx: 37, c: "#d9b13b", g: "217,177,59", n: 26 },
          { cx: 62, c: "#6fae5d", g: "111,174,93", n: 26 },
          { cx: 87, c: "#51a5a7", g: "81,165,167", n: 28 },
        ];
        const chart = document.querySelector(sel(".s9-wchart"));
        groups.forEach((grp) => {
          for (let i = 0; i < grp.n; i++) {
            const r = rnd();
            // Mass low, occasional outlier high.
            const y = r > 0.85 ? 55 + rnd() * 35 : 6 + rnd() * 34;
            const size = 4.5 + rnd() * 3;
            const el = document.createElement("div");
            el.className = "s9-sdot";
            el.style.left = (grp.cx + (rnd() - 0.5) * 11) + "%";
            el.style.bottom = (8 + y * 0.8) + "%";
            el.style.width = size + "px";
            el.style.height = size + "px";
            el.style.background = grp.c;
            el.style.boxShadow =
              `0 0 5px 1px rgba(${grp.g},0.55), 0 0 14px 3px rgba(${grp.g},0.18)`;
            chart.appendChild(el);
          }
        });

        // START STATE: scatter is on the RIGHT (+960), stat shifted left (-320), table at far left (-1280).
        // The drag carries everything to its CSS rest (scatter lands LEFT). One real reflow.
        tl.set(sel(".s9-w-scatter"), { x: 960 });
        tl.set(sel(".s9-w-stat"), { x: -320 });
        tl.set(sel(".s9-w-table"), { x: -1280 });

        // Lift from the title-card rest — emerging from dark like the reference, not instant-on.
        tl.from(sel(".s9-world"),
          { opacity: 0, filter: "blur(10px)", duration: 0.55, ease: "power2.out" }, 0);
        tl.from(sel(".s9-sdot"),
          { opacity: 0, scale: 0.5, duration: 0.35, ease: "power2.out", stagger: 0.008 }, 0.25);

        // Slow drift — motion never fully stops.
        tl.fromTo(sel(".s9-world"), { y: 8 }, { y: -8, duration: SLOT, ease: "none" }, 0);

        // Cursor enters from the right and lands on the scatter card (sitting on the right)…
        tl.fromTo(sel(".s9-cursor"),
          { x: 1640, y: 840, opacity: 0 },
          { x: 1430, y: 470, opacity: 1, duration: 0.6, ease: "power2.inOut" }, 0.45);
        // …mousedown press dip; the card lifts off the surface (scale, shadow, slight tilt)…
        tl.to(sel(".s9-cursor"), { scale: 0.86, duration: 0.08, ease: "power2.in" }, 1.1);
        tl.to(sel(".s9-w-scatter"),
          { scale: 1.025, y: -24, boxShadow: "0 60px 120px rgba(0,0,0,0.7)",
            rotationZ: -1.2, duration: 0.18, ease: "power2.out" }, 1.12);

        // …drag LEFT — scatter travels to its slot while stat + table reflow right to fill (live grid).
        tl.to(sel(".s9-cursor"), { x: 470, duration: 0.75, ease: "power2.inOut" }, 1.3);
        tl.to(sel(".s9-w-scatter"), { x: 0, duration: 0.75, ease: "power2.inOut" }, 1.3);
        tl.to(sel(".s9-w-stat"),    { x: 0, duration: 0.75, ease: "power2.inOut" }, 1.32);
        tl.to(sel(".s9-w-table"),   { x: 0, duration: 0.75, ease: "power2.inOut" }, 1.34);

        // …release: magnetic drop — the card falls into the slot with an expo snap + settle.
        tl.to(sel(".s9-cursor"), { scale: 1, duration: 0.1, ease: "expo.out" }, 2.05);
        tl.to(sel(".s9-w-scatter"),
          { y: 0, scale: 1, rotationZ: 0, boxShadow: "0 0px 0px rgba(0,0,0,0)",
            duration: 0.34, ease: "expo.out" }, 2.05);
        tl.to(sel(".s9-cursor"), { x: 360, y: 560, duration: 0.34, ease: "power2.inOut" }, 2.16);

        // EXIT: dissolve to black — title 3 rests on the far side.
        tl.to(sel(".s9-dark"), { opacity: 1, duration: 0.3, ease: "power2.in" }, 2.34);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines[ID] = tl;
      })();
    </script>
  </div>
</template>
