    <style>

      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 600; font-display: block; src: url(assets/fonts/Geist-600.woff2) format('woff2'); }
      [data-composition-id="02-triage-scatter"] {

      [data-composition-id="02-triage-scatter"] .s2-world {

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 4.8;
        const ID = "02-triage-scatter";
        const sel = (q) => `[data-composition-id="${ID}"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Seeded PRNG — determinism law. Same dots every render.
        function mulberry32(a) {
          return function () {
            a |= 0; a = (a + 0x6d2b79f5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rnd = mulberry32(7);

        // Build the crimson scatter — rising trend, accumulating left to right over the beat.
        const chart = document.querySelector(sel(".s2-chart"));
        const dots = [];
        for (let i = 0; i < 135; i++) {
          const t = rnd();                                  // 0..1 across the weeks
          const x = 2 + t * 92 + (rnd() - 0.5) * 3;         // %
          const rise = 8 + t * 58;                          // baseline climbs with time
          const y = Math.min(86, Math.max(4, rise + (rnd() - 0.5) * 42)); // % from bottom
          const r = rnd();
          const size = 4 + r * 4.5;
          const el = document.createElement("div");
          el.className = "s2-dot";
          el.style.left = x + "%";
          el.style.bottom = y + "%";
          el.style.width = size + "px";
          el.style.height = size + "px";
          // Brightness tiers — hot cores on the bigger marks, embers on the small ones.
          const core = r > 0.72 ? "#e1063a" : r > 0.35 ? "#b00426" : "#8a030b";
          el.style.background = core;
          el.style.boxShadow =
            `0 0 ${5 + r * 5}px ${1.5 + r * 1.5}px rgba(221,3,39,${0.6 + r * 0.3}),` +
            `0 0 ${16 + r * 13}px ${4 + r * 4}px rgba(221,3,39,${0.22 + r * 0.16})`;
          // Gaussian DoF — near (low) dots clearly soft, focal mid-band crisp, far rows soften.
          let dof = 0;
          if (y < 16) dof = 2.6 + r;
          else if (y < 30) dof = 1.2;
          else if (y > 74) dof = 1.0;
          if (x < 10 || x > 86) dof = Math.max(dof, 2);
          if (dof) el.style.filter = `blur(${dof.toFixed(2)}px)`;
          chart.appendChild(el);
          dots.push({ el, t, jitter: rnd() });
        }

        // Camera: slow settle drift the whole beat (hard cut in — the world is already formed).
        tl.fromTo(sel(".s2-world"),
          { rotationX: 26, rotationY: -10, rotationZ: -3.4, scale: 1.18, y: 14 },
          { rotationX: 24, rotationY: -9, rotationZ: -3, scale: 1.12, y: 0, duration: SLOT, ease: "none" }, 0);

        // Data populates ON the beat — week-1 cohort seeds instantly, the rest pops ordered by week.
        dots.forEach(({ el, t, jitter }) => {
          const at = t < 0.12 ? 0.05 + jitter * 0.3 : 0.1 + t * 3.2 + jitter * 0.35;
          tl.from(el,
            { opacity: 0, scale: 0.35, duration: 0.38, ease: "power2.out" }, at);
        });

        // Summary strip values arrive once the data has substance.
        tl.from(sel(".s2-strip-num"),
          { opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.1 }, 2.4);

        // EXIT: none — hard cut into 03 (luma-verified cut at 9.90).
        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines[ID] = tl;
      })();
    </script>
