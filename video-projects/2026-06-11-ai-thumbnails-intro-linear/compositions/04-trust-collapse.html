    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 24.2;
        const sel = (q) => `[data-composition-id="04-trust-collapse"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // "The weird part is…" — line 1 types on with a trailing underscore.
        tl.set(sel(".s4-cur1"), { opacity: 1 }, 0.4);
        tl.to(sel(".s4-wrap1"), { maxWidth: 640, duration: 1.9, ease: "steps(26)" }, 0.6);
        tl.to(sel(".s4-cur1"), { opacity: 0, duration: 0.4, ease: "steps(1)", repeat: 3, yoyo: true }, 2.5);

        // "I use AI for thumbnails" — the quiet confession.
        tl.to(sel(".s4-confess"), { opacity: 1, duration: 0.8, ease: "power1.inOut" }, 4.1667);

        // "…the issue is when your thumbnails look so obviously AI" — line 2.
        tl.set(sel(".s4-cur1"), { opacity: 0 }, 5.9);
        tl.set(sel(".s4-cur2"), { opacity: 1 }, 6.0);
        tl.to(sel(".s4-wrap2"), { maxWidth: 900, duration: 2.6, ease: "steps(36)" }, 6.0);
        tl.set(sel(".s4-cur2"), { opacity: 0 }, 9.4);

        // "…the viewer starts questioning everything" — the doubt modal slides up
        // through motion blur; the headline recedes to make room.
        tl.to(sel(".s4-headblock"), { y: -60, opacity: 0.4, duration: 0.6, ease: "power3.out" }, 9.6);
        tl.from(sel(".s4-modal"),
          { y: 180, opacity: 0, filter: "blur(12px)", duration: 0.6, ease: "power3.out" }, 9.6);

        // CHAT PUSH — the viewer's doubts arrive on their VO words. Outgoing starts
        // moving at once (inOut, never power3.in) and the incoming trails ~0.15s.
        // "Was the video low effort?"
        tl.to(sel(".s4-q1"), { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power3.out" }, 13.0);
        // "Was the script AI?"
        tl.to(sel(".s4-q1"), { y: -160, opacity: 0, filter: "blur(10px)", duration: 0.45, ease: "power3.inOut" }, 18.45);
        tl.to(sel(".s4-q2"), { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power3.out" }, 18.6);
        // "Are the claims even real?"
        tl.to(sel(".s4-q2"), { y: -160, opacity: 0, filter: "blur(10px)", duration: 0.45, ease: "power3.inOut" }, 20.45);
        tl.to(sel(".s4-q3"), { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power3.out" }, 20.6);

        // Micro-drift — the modal never parks.
        tl.to(sel(".s4-modal"), { y: -8, duration: 13, ease: "none" }, 10.3);

        // "…you lose them before you've said a word" — everything defocuses and
        // sinks; the frame collapses to black. (05 emerges from this blur.)
        tl.to(sel(".s4-zoom"),
          { filter: "blur(18px)", opacity: 0, y: "+=140", duration: 0.55, ease: "power3.in" }, 23.4333);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["04-trust-collapse"] = tl;
      })();
