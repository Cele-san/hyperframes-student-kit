    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 400; font-display: block; src: url(assets/fonts/Geist-400.woff2) format('woff2'); }
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/Geist-500.woff2) format('woff2'); }
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 600; font-display: block; src: url(assets/fonts/Geist-600.woff2) format('woff2'); }
      @font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: block; src: url(assets/fonts/GeistMono-400.woff2) format('woff2'); }
      @font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/GeistMono-500.woff2) format('woff2'); }
      [data-composition-id="02-lineup"] {
        position: absolute; inset: 0;
        background: #050811;
        overflow: hidden;
        font-family: "Geist", sans-serif;
      }
      [data-composition-id="02-lineup"] .s2-up {
        position: absolute; top: 0; left: 0;
        width: 1920px; height: 1080px;
        transform: scale(2); transform-origin: top left;
      }
      [data-composition-id="02-lineup"] .s2-stage { position: absolute; inset: 0; }
      [data-composition-id="02-lineup"] .s2-zoom { position: absolute; inset: 0; }
      [data-composition-id="02-lineup"] .s2-world {
        position: absolute; left: 0; top: 0;
        width: 1920px; height: 3900px;
      }
      /* Flow-station genre: sharp corners, mono uppercase, top-edge glint. */
      [data-composition-id="02-lineup"] .s2-station {
        position: absolute; left: 580px;
        width: 760px;
        background: linear-gradient(180deg, #131c30 0%, #0f1726 100%);
        border: 1px solid #36486f;
        box-shadow: inset 0 1px 0 rgba(210,226,255,0.18), 0 24px 60px rgba(0,0,0,0.5);
      }
      [data-composition-id="02-lineup"] .s2-head {
        display: flex; justify-content: space-between; align-items: center;

      [data-composition-id="02-lineup"] .s2-views { color: #8995b0; }
      [data-composition-id="02-lineup"] .s2-thumbbox {

      }
      /* The villains: the only color in the frame. */
      [data-composition-id="02-lineup"] .s2-thumbbox > img {

      [data-composition-id="02-lineup"] .s2-p3 { left: 420px;  top: 640px; transform: rotate(1.5deg); }
      [data-composition-id="02-lineup"] .s2-p4 { right: 410px; top: 720px; transform: rotate(-1.8deg); }

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 23.6;
        const sel = (q) => `[data-composition-id="02-lineup"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // ENTRY — lands 01's dive: emerge from blur onto station 1. ("Okay, these images.")
        tl.from(sel(".s2-zoom"),
          { filter: "blur(20px)", scale: 1.15, duration: 0.4, ease: "power2.out" }, 0);
        tl.set(sel(".s2-world"), { y: 60 }, 0);

        // MUSING CRAWL — "a few of these are obviously not… based on the channel itself
        // in previous thumbnails" — one slow continuous dolly past stations 1→2.
        tl.to(sel(".s2-world"), { y: -560, duration: 10.8, ease: "power1.inOut" }, 0.5);

        // Station 2's PREVIOUS THUMBNAILS tray opens on "…in previous thumbnails" (23.04 g).
        tl.from(sel(".s2-strip-reveal"), { height: 0, duration: 0.45, ease: "power3.out" }, 7.2333);
        tl.from(sel(".s2-mini-a"), { x: -30, opacity: 0, filter: "blur(8px)",  duration: 0.4,  ease: "power3.out" }, 7.3);
        tl.from(sel(".s2-mini-b"), { x: 14,  opacity: 0, filter: "blur(6px)",  duration: 0.45, ease: "power3.out" }, 7.4);
        tl.from(sel(".s2-mini-c"), { x: 46,  opacity: 0, filter: "blur(10px)", duration: 0.5,  ease: "power3.out" }, 7.47);

        // DEICTIC SPRINT — "this one, this one right here, ChatGPT image, ChatGPT image…"
        // Fast dolly hops; whole frame smears mid-hop; outgoing station parks overhead
        // as blurred foreground depth (carried off by the next hop).
        // [hopStart, worldY, parkSel, stampSel, stampTime]
        const RUN = [
          [11.9, -1240, ".s2-s2", ".s2-st3", 12.2],
          [13.0, -1860, ".s2-s3", ".s2-st4", 13.3],
          [14.2, -2480, ".s2-s4", ".s2-st5", 14.5],
          [15.3, -3100, ".s2-s5", ".s2-st6", 15.5],
        ];
        RUN.forEach(([t, y, park, stamp, st]) => {
          tl.to(sel(".s2-world"), { y, duration: 0.45, ease: "power3.inOut" }, t);
          tl.to(sel(".s2-zoom"), { filter: "blur(11px)", duration: 0.2, ease: "power2.in" }, t);
          tl.to(sel(".s2-zoom"), { filter: "blur(0px)", duration: 0.27, ease: "power3.out" }, t + 0.2);
          tl.to(sel(".s2-zoom"), { scaleY: 1.04, duration: 0.2, ease: "power2.in" }, t);
          tl.to(sel(".s2-zoom"), { scaleY: 1, duration: 0.27, ease: "power3.out" }, t + 0.2);
          // Outgoing parks overhead: lags the world, grows, defocuses, half-fades.
          tl.to(sel(park),
            { y: "+=160", scale: 1.4, opacity: 0.55, filter: "blur(13px)", duration: 0.5, ease: "power3.out" }, t);
          tl.set(sel(stamp), { opacity: 1 }, st);
          tl.to(sel(stamp), { scale: 0.985, duration: 0.09, ease: "power2.in", yoyo: true, repeat: 1 }, st);
        });

        // "…this one too, this one too" — rack wide; the parked evidence re-seats and
        // the two stations that slipped past unjudged get caught.
        tl.to(sel(".s2-world"), { y: -520, scale: 0.62, duration: 0.55, ease: "power3.inOut" }, 16.0);
        tl.to(sel(".s2-zoom"), { filter: "blur(10px)", duration: 0.22, ease: "power2.in" }, 16.0);
        tl.to(sel(".s2-zoom"), { filter: "blur(0px)", duration: 0.3, ease: "power3.out" }, 16.22);
        tl.to(sel(".s2-station"),
          { y: 0, scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power3.out" }, 16.05);
        tl.set(sel(".s2-st1"), { opacity: 1 }, 16.5);
        tl.to(sel(".s2-st1"), { scale: 0.985, duration: 0.09, ease: "power2.in", yoyo: true, repeat: 1 }, 16.5);
        tl.set(sel(".s2-st2"), { opacity: 1 }, 17.2333);
        tl.to(sel(".s2-st2"), { scale: 0.985, duration: 0.09, ease: "power2.in", yoyo: true, repeat: 1 }, 17.2333);

        // "They have this particular look" — the look gets named: pills fall onto the
        // wide grid from four directions, overlapping motion-blurred flights.
        tl.from(sel(".s2-p1"),
          { x: 240,  y: -130, scale: 1.22, opacity: 0, filter: "blur(12px)", duration: 0.55, ease: "power3.out" }, 17.9);
        tl.from(sel(".s2-p2"),
          { x: -320, y: 40,   scale: 1.3,  opacity: 0, filter: "blur(14px)", duration: 0.6,  ease: "power3.out" }, 18.7);
        tl.from(sel(".s2-p3"),
          { x: -180, y: 150,  scale: 1.12, opacity: 0, filter: "blur(6px)",  duration: 0.45, ease: "power3.out" }, 19.5);
        tl.from(sel(".s2-p4"),
          { x: 90,   y: 210,  scale: 1.25, opacity: 0, filter: "blur(12px)", duration: 0.55, ease: "power3.out" }, 20.3);

        // Micro-drift through the hold.
        tl.to(sel(".s2-world"), { y: "-=12", duration: 6.5, ease: "none" }, 16.6);

        // EXIT — focus-pull out of the evidence world (03 sharpens in).
        tl.to(sel(".s2-zoom"),
          { filter: "blur(18px)", opacity: 0, y: "-=120", duration: 0.4, ease: "power3.in" }, 23.2);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["02-lineup"] = tl;
      })();
    </script>
  </div>
</template>
