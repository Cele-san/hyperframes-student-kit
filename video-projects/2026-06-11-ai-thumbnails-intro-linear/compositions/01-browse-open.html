    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 15.8;
        const sel = (q) => `[data-composition-id="01-browse-open"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // OPEN — darkness lifts while the camera pulls back from steep and close.
        tl.to(sel(".s1-dark"), { opacity: 0, duration: 1.1, ease: "power1.inOut" }, 0.05);
        tl.fromTo(sel(".s1-tilt"),
          { rotationX: 14, rotationY: -16, scale: 1.34, y: 36 },
          { rotationX: 4.5, rotationY: -7, scale: 1.12, y: 0, duration: 3.8, ease: "power2.out" }, 0.05);

        // Alive texture: the search query types on with a beam caret ("looking for inspiration").
        tl.to(sel(".s1-caret"), { opacity: 0, duration: 0.3, ease: "steps(1)", repeat: 1, yoyo: true }, 0.1);
        tl.to(sel(".s1-search-wrap"), { maxWidth: 200, duration: 1.4, ease: "steps(21)" }, 0.7);
        tl.to(sel(".s1-caret"), { opacity: 0, duration: 0.4, ease: "steps(1)", repeat: 3, yoyo: true }, 2.2);

        // BROWSE HOPS — camera hops thumb to thumb; the whole frame smears mid-hop
        // (Law #10) and resolves sharp as each white-fill stamp lands on its VO word.
        // [worldX, worldY, hopStart, stampSel, stampTime]
        const HOPS = [
          [ 432,  220, 3.55, ".s1-st1", 3.9    ],  // "…the same THUMBNAIL"
          [  -4,  220, 4.62, ".s1-st2", 4.9667 ],  // "OVER and OVER"
          [  -4,  -94, 6.55, ".s1-st5", 6.9    ],  // "different CHANNELS"
          [ 432,  -94, 7.72, ".s1-st4", 8.0667 ],  // "different TOPICS"
          [-440,  220, 8.92, ".s1-st3", 9.2667 ],  // "it ALL"
        ];
        HOPS.forEach(([x, y, t, stamp, st]) => {
          tl.to(sel(".s1-world"), { x, y, duration: 0.35, ease: "power3.inOut" }, t);
          tl.to(sel(".s1-zoom"), { filter: "blur(9px)", duration: 0.16, ease: "power2.in" }, t);
          tl.to(sel(".s1-zoom"), { filter: "blur(0px)", duration: 0.22, ease: "power3.out" }, t + 0.16);
          tl.to(sel(".s1-zoom"), { scaleY: 1.03, duration: 0.16, ease: "power2.in" }, t);
          tl.to(sel(".s1-zoom"), { scaleY: 1, duration: 0.22, ease: "power3.out" }, t + 0.16);
          // White-fill arrival: instant set on the beat + a pressed-in micro-dip.
          tl.set(sel(stamp), { opacity: 1 }, st);
          tl.to(sel(stamp), { scale: 0.985, duration: 0.09, ease: "power2.in", yoyo: true, repeat: 1 }, st);
        });

        // "…had the SAME look" — pull back to the wide grid; the sixth stamp lands
        // and every thumb pulses one white edge-glow wave.
        tl.to(sel(".s1-world"), { x: 0, y: 0, scale: 1.0, duration: 0.5, ease: "power3.inOut" }, 9.4);
        tl.to(sel(".s1-zoom"), { filter: "blur(8px)", duration: 0.2, ease: "power2.in" }, 9.4);
        tl.to(sel(".s1-zoom"), { filter: "blur(0px)", duration: 0.28, ease: "power3.out" }, 9.6);
        tl.set(sel(".s1-st6"), { opacity: 1 }, 9.6667);
        tl.to(sel(".s1-thumbwrap"), {
          boxShadow: "0 0 22px rgba(240,168,194,0.35)",
          duration: 0.3, ease: "power2.out", stagger: 0.05,
        }, 9.6667);
        tl.to(sel(".s1-thumbwrap"), {
          boxShadow: "0 0 0px rgba(240,168,194,0)",
          duration: 0.5, ease: "power2.inOut", stagger: 0.05,
        }, 10.1);

        // "What was that glossy, futuristic…" — dive-zoom into the hero thumb.
        tl.to(sel(".s1-world"), { x: -8, y: 420, scale: 2.05, duration: 0.55, ease: "power3.inOut" }, 11.1667);
        tl.to(sel(".s1-zoom"), { filter: "blur(8px)", duration: 0.24, ease: "power2.in" }, 11.1667);
        tl.to(sel(".s1-zoom"), { filter: "blur(0px)", duration: 0.3, ease: "power3.out" }, 11.4067);

        // Tag pills fall onto the close-up from different directions — overlapping
        // motion-blurred flights, never a uniform stagger (Law #10 + fall-on recipe).
        tl.from(sel(".s1-pill-glossy"),
          { x: 180, y: -90, scale: 1.18, opacity: 0, filter: "blur(10px)", duration: 0.5, ease: "power3.out" }, 11.5);
        tl.from(sel(".s1-pill-futur"),
          { x: -240, y: 50, scale: 1.25, opacity: 0, filter: "blur(12px)", duration: 0.55, ease: "power3.out" }, 12.0667);

        // "ChatGPT Image 2.0 look?" — the accusation lands as a white-fill bar.
        tl.set(sel(".s1-bigstamp"), { opacity: 1 }, 13.6667);
        tl.to(sel(".s1-c2 .s1-thumbwrap"), { scale: 0.985, duration: 0.09, ease: "power2.in", yoyo: true, repeat: 1 }, 13.6667);

        // Micro-drift through the holds — motion never fully stops.
        tl.to(sel(".s1-world"), { y: "-=10", duration: 5.6, ease: "none" }, 9.7);

        // EXIT — blurred dive into the evidence world (02 emerges from blur).
        tl.to(sel(".s1-zoom"),
          { scale: 2.5, opacity: 0, filter: "blur(20px)", duration: 0.4, ease: "power3.in" }, 15.4);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["01-browse-open"] = tl;
      })();
