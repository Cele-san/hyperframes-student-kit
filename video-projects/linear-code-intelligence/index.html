    <style>

  <body>
    <!--
      BEAT GRID: synthetic 120 BPM — B = 0.5s (15 frames at 30fps).
      Every data-start below and every cut/card-hit inside the sub-compositions
      sits on n * 0.5s. No music this pass; a 120 BPM track can be married to
      the cut later without re-timing. Spec: DESIGN.linear.md (workspace root).

      Storyboard map (8 frames) — one continuous world, camera-led transitions:
        01  0–4    iso open + triangle glyph bloom + headline → DIVE into the input (exit inside 01)
        02  4–7    typewriter question + send beat            → motion-blur dive (exit inside 02)
        03  7–16   dolly past 5 flow stations over live code  → focus-pull out (exit inside 03)
        04  16–20  typed pills list → perspective answer panel → soft dissolve into rest (exit inside 04)
        05  20–22  title card "Understand product behavior"   → cut into modal slide-up
        06  22–27  Ask Linear modal, chat-push prompt cycle   → cut into title fade
        07  27–30  title card "Answers grounded in your codebase" → cross-dissolve (exit inside 07)
        08  30–33  Linear lockup fades in, ends dead-still (no fade-out)
    -->
    <div data-hf-id="hf-6foa" id="root" data-composition-id="linear-code-intelligence" data-start="0" data-duration="33" data-width="1920" data-height="1080">
      <div data-hf-id="hf-hzv2" class="beat-layer" data-composition-id="01-iso-open" data-composition-src="compositions/01-iso-open.html" data-start="0" data-duration="4" data-track-index="0" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-bljf" class="beat-layer" data-composition-id="02-typewriter" data-composition-src="compositions/02-typewriter.html" data-start="4" data-duration="3" data-track-index="0" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-uh20" class="beat-layer" data-composition-id="03-flow-cascade" data-composition-src="compositions/03-flow-cascade.html" data-start="7" data-duration="9" data-track-index="0" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-ss9r" class="beat-layer" data-composition-id="04-markdown-response" data-composition-src="compositions/04-markdown-response.html" data-start="16" data-duration="4" data-track-index="0" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-x80e" class="beat-layer" data-composition-id="05-title-understand" data-composition-src="compositions/05-title-understand.html" data-start="20" data-duration="2" data-track-index="0" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-8gr7" class="beat-layer" data-composition-id="06-prompt-cycle" data-composition-src="compositions/06-prompt-cycle.html" data-start="22" data-duration="5" data-track-index="0" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-6pdi" class="beat-layer" data-composition-id="07-title-grounded" data-composition-src="compositions/07-title-grounded.html" data-start="27" data-duration="3" data-track-index="0" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-9bn2" class="beat-layer" data-composition-id="08-logo-outro" data-composition-src="compositions/08-logo-outro.html" data-start="30" data-duration="3" data-track-index="0" data-width="1920" data-height="1080"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // Root anchor — 33s slot (Law #11). Sub-composition timelines auto-link.
      tl.to({}, { duration: 33 }, 0);
      window.__timelines["linear-code-intelligence"] = tl;
    </script>
