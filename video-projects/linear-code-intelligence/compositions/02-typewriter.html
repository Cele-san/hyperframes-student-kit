    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 3;
        const sel = (q) => `[data-composition-id="02-typewriter"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // ENTRY — lands 01's dive: emerge from blur, already close. No pop.
        tl.from(sel(".s2-zoom"),
          { filter: "blur(14px)", scale: 1.12, duration: 0.27, ease: "power2.out" }, 0);

        // Slow settle drift through the typing — the camera never parks.
        tl.to(sel(".s2-tilt"), { y: -10, duration: 2.3, ease: "none" }, 0.2);

        // Beat of stillness: empty field, beam caret blinks once.
        tl.to(sel(".s2-cursor"),
          { opacity: 0, duration: 0.15, ease: "steps(1)", repeat: 1, yoyo: true }, 0.05);

        // Typewriter — 42 chars over 2.1s (~20 chars/s), caret riding the clip edge.
        tl.to(sel(".s2-type-wrap"),
          { maxWidth: 620, duration: 2.1, ease: "steps(42)" }, 0.3);

        // SEND BEAT: caret vanishes, send circle flashes, text clears back to placeholder.
        tl.set(sel(".s2-cursor"), { opacity: 0 }, 2.45);
        tl.set(sel(".s2-send"), { backgroundColor: "#caccce" }, 2.5);
        tl.set(sel(".s2-send"), { backgroundColor: "#2c2f33" }, 2.6);
        tl.set(sel(".s2-type-wrap"), { opacity: 0 }, 2.6);
        tl.set(sel(".s2-ph"), { opacity: 1 }, 2.6);

        // Small pull-back before the dive — the reference breathes out before it drops in.
        tl.to(sel(".s2-persp"), { scale: 0.965, y: 12, duration: 0.2, ease: "power1.inOut" }, 2.5);

        // EXIT (local 2.7) — motion-blur dive into the code world (03 emerges from blur).
        tl.to(sel(".s2-zoom"),
          { scale: 2.6, opacity: 0, filter: "blur(20px)", duration: 0.3, ease: "power3.in" }, 2.7);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["02-typewriter"] = tl;
