      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/Geist-500.woff2) format('woff2'); }
      @font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: block; src: url(assets/fonts/GeistMono-400.woff2) format('woff2'); }
      [data-composition-id="01-iso-open"] {

      [data-composition-id="01-iso-open"] .s1-dive { position: absolute; inset: 0; }
      [data-composition-id="01-iso-open"] .s1-persp {
        position: absolute; inset: 0;
        perspective: 1400px;
        display: flex; align-items: center; justify-content: center;
      }
      /* CSS resting transform = camera END state; the timeline fromTo lands here. */
      [data-composition-id="01-iso-open"] .s1-iso {
        transform: rotateX(23deg) rotateY(-14deg) scale(1.18);
        transform-style: preserve-3d;
      }
      [data-composition-id="01-iso-open"] .s1-panel {

      [data-composition-id="01-iso-open"] .s1-r0 .s1-glyph { color: #3f444b; }
      [data-composition-id="01-iso-open"] .s1-r1 .s1-glyph { color: #464b53; }
      [data-composition-id="01-iso-open"] .s1-r2 .s1-glyph { color: #4e535b; }
      [data-composition-id="01-iso-open"] .s1-r3 .s1-glyph { color: #575d66; }

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 4;
        const sel = (q) => `[data-composition-id="01-iso-open"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Lift out of near-darkness.
        tl.to(sel(".s1-dark"), { opacity: 0, duration: 1.2, ease: "power2.out" }, 0);

        // Camera: slow continuous pull-back at a steep tilt — drifts the whole beat.
        tl.fromTo(sel(".s1-iso"),
          { rotationX: 30, rotationY: -24, scale: 1.45, y: 40 },
          { rotationX: 23, rotationY: -14, scale: 1.18, y: 0, duration: 3.8, ease: "power2.out" }, 0);

        // Headline fades in on the panel with the darkness lift — plain fade, no tracking stunt.
        tl.from(sel(".s1-headline"),
          { opacity: 0, y: 10, duration: 0.9, ease: "power2.out" }, 0.3);

        // Seed *_ is the first thing alive; its underscore blinks like a terminal cursor.
        tl.from(sel(".s1-seedrow"), { opacity: 0, duration: 0.5, ease: "power2.out" }, 0.2);
        tl.to(sel(".s1-seedcur"),
          { opacity: 0, duration: 0.4, ease: "steps(1)", repeat: 7, yoyo: true }, 0.5);

        // Triangle bloom — each glyph's delay is its distance from the seed (deterministic).
        const ROWS = [13, 11, 9, 7, 5, 3];
        ROWS.forEach((n, r) => {
          const rowDist = ROWS.length - r; // rows above the seed
          for (let c = 0; c < n; c++) {
            const x = Math.abs(c - (n - 1) / 2) * 0.55;
            const d = Math.sqrt(x * x + rowDist * rowDist);
            tl.from(sel(`.s1-r${r} .s1-glyph:nth-child(${c + 1})`),
              { opacity: 0, scale: 0.7, duration: 0.45, ease: "power2.out" }, 1.4 + d * 0.14);
          }
        });

        // Input surfaces late, once the camera has revealed the panel bottom.
        tl.from(sel(".s1-input"), { opacity: 0, duration: 0.7, ease: "power2.out" }, 2.4);

        // EXIT — fast dive toward the input (one continuous world into 02-typewriter).
        tl.to(sel(".s1-dive"),
          { scale: 2.3, y: -430, filter: "blur(20px)", duration: 0.27, ease: "power3.in" }, 3.73);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["01-iso-open"] = tl;
      })();
    </script>
