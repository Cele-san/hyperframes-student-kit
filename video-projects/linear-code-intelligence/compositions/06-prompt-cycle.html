<template id="comp-06-prompt-cycle">
  <div data-composition-id="06-prompt-cycle" data-width="1920" data-height="1080">
    <div class="s6-stage">
      <div class="s6-modal">
        <div class="s6-head">
          <span class="s6-headlabel">Ask Linear</span>
          <span class="s6-close">
            <svg viewBox="0 0 20 20" fill="none" stroke="#9ba0a6" stroke-width="1.6" stroke-linecap="round"><path d="M5 5l10 10"/><path d="M15 5L5 15"/></svg>
          </span>
        </div>
        <div class="s6-body">
          <div class="s6-q s6-q1">What parts of the system would this feature touch?</div>
          <div class="s6-q s6-q2">Did anything change recently that could affect SSO login?</div>
          <div class="s6-q s6-q3">Why might this sync fail?</div>
        </div>
      </div>
      <div class="s6-vignette"></div>
    </div>

    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 400; font-display: block; src: url(assets/fonts/Geist-400.woff2) format('woff2'); }
      [data-composition-id="06-prompt-cycle"] {
        position: absolute; inset: 0;
        background: #050607;
        overflow: hidden;
        font-family: "Geist", sans-serif;
      }
      [data-composition-id="06-prompt-cycle"] .s6-stage { position: absolute; inset: 0; }
      /* Bottom-anchored: the modal extends past the frame bottom (reference 0:23–0:28). */
      [data-composition-id="06-prompt-cycle"] .s6-modal {
        position: absolute;
        left: 50%; margin-left: -620px;
        top: 320px;
        width: 1240px; height: 1000px;
        background: linear-gradient(180deg, #131416 0%, #0d0e10 100%);
        border: 1px solid #232528;
        border-radius: 24px;
        box-shadow: 0 30px 90px rgba(0,0,0,0.6);
        display: flex; flex-direction: column;
      }
      /* Sentence-case product chrome — not a mono-uppercase label. */
      [data-composition-id="06-prompt-cycle"] .s6-head {
        flex: none;
        display: flex; align-items: center; justify-content: space-between;
        padding: 30px 40px;
        border-bottom: 1px solid #232528;
      }
      [data-composition-id="06-prompt-cycle"] .s6-headlabel {
        font-size: 28px; font-weight: 400;
        color: #e8eaec;
      }
      [data-composition-id="06-prompt-cycle"] .s6-close { width: 24px; height: 24px; }
      [data-composition-id="06-prompt-cycle"] .s6-close svg { width: 24px; height: 24px; }
      /* Bubbles clip under the header divider as they push up and out. */
      [data-composition-id="06-prompt-cycle"] .s6-body {
        position: relative;
        flex: 1;
        overflow: hidden;
      }
      [data-composition-id="06-prompt-cycle"] .s6-q {
        position: absolute;
        top: 56px; right: 44px;
        width: fit-content;
        max-width: 700px;
        background: #1c1e21;
        border-radius: 16px;
        padding: 22px 30px;
        font-size: 30px; font-weight: 400;
        line-height: 1.45;
        color: #ecedef;
        opacity: 0;
        transform: translateY(70px);
        filter: blur(8px); /* pre-flight motion blur — the in-tween clears it */
      }
      [data-composition-id="06-prompt-cycle"] .s6-vignette {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, rgba(5,6,7,0) 52%, rgba(0,0,0,0.55) 100%);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 5;
        const sel = (q) => `[data-composition-id="06-prompt-cycle"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // ENTRY — the modal slides up into place through motion blur (no overshoot pop).
        tl.from(sel(".s6-modal"),
          { y: 180, opacity: 0, filter: "blur(12px)", duration: 0.6, ease: "power3.out" }, 0.05);

        // Micro-drift through the beat — motion never fully stops.
        tl.to(sel(".s6-modal"), { y: -8, duration: 4.2, ease: "none" }, 0.7);

        // CHAT PUSH — each new question rises from below while the old one
        // slides up and clips under the header divider. Bubbles are blurred while
        // moving, sharp only at rest. Swaps on the beat grid.
        // q1 in
        tl.to(sel(".s6-q1"), { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power3.out" }, 0.9);
        // q1 → q2 — outgoing starts moving at once (inOut), incoming trails a tenth
        // so the swap reads as one push, not two bubbles sharing the slot.
        tl.to(sel(".s6-q1"), { y: -160, opacity: 0, filter: "blur(10px)", duration: 0.45, ease: "power3.inOut" }, 2.3);
        tl.to(sel(".s6-q2"), { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power3.out" }, 2.45);
        // q2 → q3
        tl.to(sel(".s6-q2"), { y: -160, opacity: 0, filter: "blur(10px)", duration: 0.45, ease: "power3.inOut" }, 3.7);
        tl.to(sel(".s6-q3"), { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power3.out" }, 3.85);

        // EXIT: none — cut to title card 2's slow fade.
        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["06-prompt-cycle"] = tl;
      })();
    </script>
  </div>
</template>
