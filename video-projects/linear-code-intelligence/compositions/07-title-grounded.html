      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 3;
        const sel = (q) => `[data-composition-id="07-title-grounded"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Slow luminance fade — same treatment as title 1.
