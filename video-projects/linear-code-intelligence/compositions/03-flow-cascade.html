    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 9;
        const sel = (q) => `[data-composition-id="03-flow-cascade"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // ENTRY — emerge FROM blur (lands 02's motion-blur dive).
        tl.from(sel(".s3-zoom"),
          { filter: "blur(20px)", scale: 1.15, duration: 0.4, ease: "power3.out" }, 0);

        // Continuous slow drift on the outer wrapper — the camera never parks.
        tl.to(sel(".s3-zoom"), { y: -40, duration: 8.5, ease: "none" }, 0);

        // DOLLY HOPS — beat grid: 2.0 / 3.5 / 5.0 / 6.5. Per hop: the whole frame
        // smears (full-frame motion blur + vertical stretch), the outgoing station
        // PARKS overhead as a blurred foreground layer (it lags the world and stays
        // peeking into the top of frame until the next hop carries it off), and the
        // incoming station sharpens up from below.
        const hops = [2.0, 3.5, 5.0, 6.5];
        hops.forEach((t, i) => {
          tl.to(sel(".s3-world"),
            { y: -620 * (i + 1), duration: 0.5, ease: "power3.inOut" }, t);

          // Full-frame motion blur, peaking mid-hop, resolving on arrival.
          tl.to(sel(".s3-zoom"), { filter: "blur(11px)", duration: 0.22, ease: "power2.in" }, t);
          tl.to(sel(".s3-zoom"), { filter: "blur(0px)", duration: 0.3, ease: "power3.out" }, t + 0.22);
          tl.to(sel(".s3-zoom"), { scaleY: 1.045, duration: 0.22, ease: "power2.in" }, t);
          tl.to(sel(".s3-zoom"), { scaleY: 1, duration: 0.3, ease: "power3.out" }, t + 0.22);

          // Outgoing station parks overhead: lags the world (+160 counter-drift),
          // grows toward the lens, defocuses — but stays visible.
          tl.to(sel(`.s3-sec${i + 1} .s3-st`),
            { y: 160, scale: 1.4, opacity: 0.55, filter: "blur(13px)", duration: 0.55, ease: "power3.out" }, t);

          tl.from(sel(`.s3-sec${i + 2} .s3-st`),
            { scale: 0.92, filter: "blur(8px)", duration: 0.6, ease: "power3.out" }, t + 0.05);
        });

        // Station micro-states.
        tl.set(sel(".s3-act"), { backgroundColor: "#1d2023", color: "#d4d7da" }, 1.4);  // pressed → settled
        tl.set(sel(".s3-yes"), { backgroundColor: "#d9dbdd", color: "#17191c" }, 4.3);  // YES fills white
        tl.fromTo(sel(".s3-fill"),
          { scaleX: 0 }, { scaleX: 1, duration: 0.9, ease: "power1.inOut" }, 7.0);      // SENDING sweep
        tl.set(sel(".s3-sending"), { opacity: 0 }, 7.9);
        tl.set(sel(".s3-sent"), { opacity: 1 }, 7.9);                                    // → SENT

        // Floating code tags surface shortly after each arrival.
        [[".s3-tag2", 2.4], [".s3-tag3", 3.9], [".s3-tag4", 5.4], [".s3-tag5", 6.9]].forEach(([q, t]) => {
          tl.from(sel(q), { opacity: 0, y: 8, duration: 0.4, ease: "power2.out" }, t);
        });

        // Live code types on near the active station (~25 chars/s, trailing _ baked into the text).
        const TYPE = [
          { col: "1A", start: 0.5, lens: [38, 20, 4, 31, 4, 10, 10] },
          { col: "1B", start: 0.9, lens: [33, 0, 32, 31, 21] },
          { col: "2A", start: 2.3, lens: [42, 44, 0, 16, 40, 3, 0, 25, 34] },
          { col: "3A", start: 3.8, lens: [16, 37, 1, 0, 8, 19] },
          { col: "3B", start: 4.1, lens: [23, 33, 33] },
          { col: "4A", start: 5.3, lens: [8, 21, 26] },
          { col: "5A", start: 6.8, lens: [44, 0, 19, 19, 28, 24] },
          { col: "5B", start: 7.1, lens: [29, 22, 22, 15] },
        ];
        TYPE.forEach(({ col, start, lens }) => {
          lens.forEach((n, i) => {
            if (!n) return;
            tl.to(sel(`.s3-col${col} .s3-cl:nth-child(${i + 1})`),
              { maxWidth: 680, duration: n / 25, ease: `steps(${n})` }, start + i * 0.16);
          });
        });

        // EXIT (local 8.5) — focus-pull out: the world defocuses and drifts up into 04's flat list.
        tl.to(sel(".s3-zoom"),
          { filter: "blur(18px)", opacity: 0, y: -160, duration: 0.5, ease: "power3.in" }, 8.5);

        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["03-flow-cascade"] = tl;
      })();
    </script>
