<template id="comp-05-title-understand">
  <div data-composition-id="05-title-understand" data-width="1920" data-height="1080">
    <div class="s5-stage">
      <h1 class="s5-title">Understand product behavior</h1>
    </div>

    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/Geist-500.woff2) format('woff2'); }
      [data-composition-id="05-title-understand"] {
        position: absolute; inset: 0;
        background: #000; /* pure black is reserved for rests — this is one */
        overflow: hidden;
        font-family: "Geist", sans-serif;
      }
      [data-composition-id="05-title-understand"] .s5-stage {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      /* Gray-white, never full white — the reference titles sit at ~80% luminance. */
      [data-composition-id="05-title-understand"] .s5-title {
        font-size: 76px; font-weight: 500;
        letter-spacing: -0.01em;
        color: #c7cacd;
        white-space: nowrap;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 2;
        const sel = (q) => `[data-composition-id="05-title-understand"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Slow luminance fade — pure opacity, no scale-from, no slide. The rest breathes in.
        tl.from(sel(".s5-title"),
          { opacity: 0, duration: 1.1, ease: "power1.inOut" }, 0.15);

        // Micro-drift through the hold — motion never fully stops.
        tl.to(sel(".s5-title"), { scale: 1.006, duration: 0.7, ease: "none" }, 1.3);

        // EXIT: none — cut into 06's slide-up modal entrance.
        tl.to({}, { duration: SLOT }, 0); // Law #11 anchor
        window.__timelines["05-title-understand"] = tl;
      })();
    </script>
  </div>
</template>
