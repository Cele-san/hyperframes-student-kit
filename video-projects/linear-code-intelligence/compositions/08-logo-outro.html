<template id="comp-08-logo-outro">
  <div data-composition-id="08-logo-outro" data-width="1920" data-height="1080">
    <div class="s8-stage">
      <div class="s8-lockup">
        <svg class="s8-mark" viewBox="0 0 100 100" fill="none">
          <!-- Linear mark: solid circle with diagonal stripe cuts toward the lower-left. -->
          <defs>
            <mask id="s8-cutmask">
              <circle cx="50" cy="50" r="44" fill="white"/>
              <g transform="rotate(45 50 50)">
                <rect x="-30" y="61" width="160" height="5.5" fill="black"/>
                <rect x="-30" y="73.5" width="160" height="5.5" fill="black"/>
                <rect x="-30" y="86" width="160" height="5.5" fill="black"/>
              </g>
            </mask>
          </defs>
          <circle cx="50" cy="50" r="44" fill="#dcdee0" mask="url(#s8-cutmask)"/>
        </svg>
        <span class="s8-wordmark">Linear</span>
      </div>
    </div>

    <style>
      @font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: block; src: url(assets/fonts/Geist-500.woff2) format('woff2'); }
      [data-composition-id="08-logo-outro"] {
        position: absolute; inset: 0;
        background: #000; /* the final rest */
        overflow: hidden;
        font-family: "Geist", sans-serif;
      }
      [data-composition-id="08-logo-outro"] .s8-stage {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="08-logo-outro"] .s8-lockup {
        display: flex; align-items: center; gap: 26px;
      }
      [data-composition-id="08-logo-outro"] .s8-mark { width: 96px; height: 96px; }
      [data-composition-id="08-logo-outro"] .s8-wordmark {
        font-size: 72px; font-weight: 500;
        letter-spacing: -0.02em;
        color: #dcdee0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (() => {
        const SLOT = 3;
        const sel = (q) => `[data-composition-id="08-logo-outro"] ${q}`;
        const tl = gsap.timeline({ paused: true });

        // Fade-in only — no scale, no drift. Then the longest stillness in the piece.
        tl.from(sel(".s8-lockup"),
          { opacity: 0, duration: 1.0, ease: "power2.out" }, 0.27);

        // No exit: the reference ends dead-still on the logo. (Law #11 anchor below.)
        tl.to({}, { duration: SLOT }, 0);
        window.__timelines["08-logo-outro"] = tl;
      })();
    </script>
